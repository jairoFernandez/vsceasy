<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 320" font-family="-apple-system, Segoe UI, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Priority dropdown expanded</title>
  <desc id="d">The Priority select opened, showing the three options low, medium and high derived from the model's union type.</desc>
  <rect width="470" height="320" fill="#1e1e1e"/>

  <text x="40" y="44" fill="#e7e7e7" font-size="20" font-weight="500">New Todos</text>

  <text x="40" y="92" fill="#9d9d9d" font-size="13">Priority</text>
  <rect x="40" y="100" width="380" height="30" rx="3" fill="#3c3c3c" stroke="#0e639c" stroke-width="2"/>
  <path d="M400 111 l6 6 l6 -6" fill="none" stroke="#cccccc" stroke-width="1.5"/>

  <rect x="40" y="132" width="380" height="120" rx="3" fill="#252526" stroke="#454545"/>
  <rect x="42" y="134" width="376" height="32" fill="#0e639c"/>
  <text x="56" y="155" fill="#ffffff" font-size="13">✓</text>
  <text x="76" y="186" fill="#d4d4d4" font-size="13">low</text>
  <text x="76" y="216" fill="#d4d4d4" font-size="13">medium</text>
  <text x="76" y="244" fill="#d4d4d4" font-size="13">high</text>
</svg>
