<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" font-family="-apple-system, Segoe UI, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Todos status bar item</title>
  <desc id="d">The bottom status bar of VS Code with a Todos item bound to the list panel.</desc>
  <rect width="700" height="120" fill="#1e1e1e"/>

  <text x="20" y="44" fill="#6a6a6a" font-size="13">… editor area …</text>

  <rect x="0" y="86" width="700" height="26" fill="#007acc"/>
  <g fill="#ffffff" font-size="12">
    <text x="14" y="103">&#9881; main</text>
    <text x="90" y="103">Launchpad</text>
    <rect x="178" y="86" width="92" height="26" fill="#1177bb"/>
    <text x="190" y="103">&#8801; Todos</text>
