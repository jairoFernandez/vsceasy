<svg width="470" height="360" viewBox="0 0 470 360" role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif">
  <title id="t">CRUD form with a relation dropdown</title>
  <desc id="d">The generated Todo form: a Category field rendered as a dropdown populated from the Category model's rows — Work, Home, Errands.</desc>
  <rect width="470" height="360" fill="#1e1e1e"/>

  <text x="24" y="42" fill="#e7e7e7" font-size="20" font-weight="500">New Todo</text>

  <text x="24" y="78" fill="#9d9d9d" font-size="13">Id</text>
  <rect x="24" y="86" width="370" height="30" rx="3" fill="#3c3c3c" stroke="#5a5a5a"/>

  <text x="24" y="142" fill="#9d9d9d" font-size="13">Title</text>
  <rect x="24" y="150" width="370" height="30" rx="3" fill="#3c3c3c" stroke="#5a5a5a"/>

  <text x="24" y="206" fill="#9d9d9d" font-size="13">Done</text>
  <rect x="200" y="192" width="16" height="16" rx="2" fill="#3c3c3c" stroke="#5a5a5a"/>

  <text x="24" y="250" fill="#9d9d9d" font-size="13">Category</text>
  <rect x="24" y="258" width="370" height="30" rx="3" fill="#3c3c3c" stroke="#0e639c" stroke-width="2"/>
  <text x="34" y="278" fill="#d4d4d4" font-size="13">Work</text>
  <path d="M376 270 l6 6 l6 -6" fill="none" stroke="#cccccc" stroke-width="1.5"/>

  <rect x="24" y="290" width="180" height="66" rx="3" fill="#252526" stroke="#454545"/>
  <rect x="26" y="292" width="176" height="20" fill="#0e639c"/>
  <text x="34" y="306" fill="#ffffff" font-size="13">Work</text>
  <text x="34" y="328" fill="#d4d4d4" font-size="13">Home</text>
  <text x="34" y="348" fill="#d4d4d4" font-size="13">Errands</text>

  <text x="224" y="328" fill="#6a6a6a" font-size="11">options loaded from the</text>
  <text x="224" y="344" fill="#6a6a6a" font-size="11">Category model via RPC</text>
</svg>
