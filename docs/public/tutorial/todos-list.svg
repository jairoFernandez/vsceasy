<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="-apple-system, Segoe UI, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Todos list panel</title>
  <desc id="d">The generated list panel showing four seeded todos with Id, Title, Done, Priority and Due Date columns, plus Refresh, New, Edit and Delete actions.</desc>
  <rect width="900" height="360" fill="#1e1e1e"/>
  <rect width="900" height="36" fill="#252526"/>
  <rect x="0" y="0" width="120" height="36" fill="#1e1e1e"/>
  <text x="16" y="23" fill="#cccccc" font-size="13">Todos</text>
  <rect x="118" y="0" width="2" height="36" fill="#0e639c"/>

  <text x="32" y="78" fill="#e7e7e7" font-size="22" font-weight="500">Todos</text>
  <g>
    <rect x="690" y="58" width="78" height="28" rx="4" fill="#0e639c"/>
    <text x="729" y="77" fill="#ffffff" font-size="13" text-anchor="middle">Refresh</text>
    <rect x="776" y="58" width="72" height="28" rx="4" fill="#0e639c"/>
