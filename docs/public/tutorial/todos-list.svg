      <text x="716" y="142" fill="#ffffff" text-anchor="middle">Edit</text>
      <rect x="750" y="126" width="64" height="24" rx="4" fill="#3a3d41"/>
      <text x="782" y="142" fill="#ffffff" text-anchor="middle">Delete</text>
      <line x1="32" y1="152" x2="868" y2="152" stroke="#2a2a2a"/>
    </g>
    <g>
      <text x="40" y="178">t3</text>
      <text x="92" y="178">Buy coffee</text>
      <text x="300" y="178">true</text>
      <text x="380" y="178">low</text>
      <rect x="690" y="164" width="52" height="24" rx="4" fill="#3a3d41"/>
      <text x="716" y="180" fill="#ffffff" text-anchor="middle">Edit</text>
      <rect x="750" y="164" width="64" height="24" rx="4" fill="#3a3d41"/>
      <text x="782" y="180" fill="#ffffff" text-anchor="middle">Delete</text>
      <line x1="32" y1="190" x2="868" y2="190" stroke="#2a2a2a"/>
    </g>
    <g>
      <text x="40" y="216">t2</text>
      <text x="92" y="216">Ship vsceasy 0.2</text>
      <text x="300" y="216">false</text>
      <text x="380" y="216">medium</text>
      <text x="480" y="216">2026-06-20T09:00:00.000Z</text>
      <rect x="690" y="202" width="52" height="24" rx="4" fill="#3a3d41"/>
      <text x="716" y="218" fill="#ffffff" text-anchor="middle">Edit</text>
      <rect x="750" y="202" width="64" height="24" rx="4" fill="#3a3d41"/>
      <text x="782" y="218" fill="#ffffff" text-anchor="middle">Delete</text>
      <line x1="32" y1="228" x2="868" y2="228" stroke="#2a2a2a"/>
    </g>
    <g>
      <text x="40" y="254">t1</text>
      <text x="92" y="254">Write the tutorial</text>
      <text x="300" y="254">false</text>
      <text x="380" y="254">high</text>
      <text x="480" y="254">2026-06-10T09:00:00.000Z</text>
      <rect x="690" y="240" width="52" height="24" rx="4" fill="#3a3d41"/>
      <text x="716" y="256" fill="#ffffff" text-anchor="middle">Edit</text>
      <rect x="750" y="240" width="64" height="24" rx="4" fill="#3a3d41"/>
