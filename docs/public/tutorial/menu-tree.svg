<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" font-family="-apple-system, Segoe UI, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Todos menu tree in the activity bar</title>
  <desc id="d">The Todos menu showing the Panels and Actions groups plus the Todos and New Todo items, which link to the list and form panels.</desc>
  <rect width="320" height="220" fill="#252526"/>

  <g transform="translate(14,28)">
    <path d="M0 -4 l5 4 l-5 4" fill="none" stroke="#cccccc" stroke-width="1.4"/>
    <text x="14" y="4" fill="#cccccc" font-size="12" font-weight="700" letter-spacing="0.5">TODOS</text>
    <rect x="270" y="-8" width="14" height="14" rx="2" fill="none" stroke="#5a5a5a"/>
  </g>

  <g font-size="13" fill="#cdcdcd">
    <text x="44" y="62">Panels</text>
    <text x="44" y="92">Actions</text>

    <text x="30" y="124" fill="#9d9d9d" font-size="13">&#8801;</text>
    <text x="48" y="124">Todos</text>

    <text x="30" y="154" fill="#9d9d9d" font-size="14">+</text>
    <text x="48" y="154">New Todo</text>
  </g>

  <text x="30" y="196" fill="#6a6a6a" font-size="11">Todos &#8594; todosList panel  &#183;  New Todo &#8594; todoForm panel</text>
</svg>
