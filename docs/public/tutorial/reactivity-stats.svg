<svg width="680" height="250" viewBox="0 0 680 250" role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif">
  <title id="t">Stats subpanel updating live</title>
  <desc id="d">Before and after saving a todo: the Stats subpanel updates on its own — Done drops from 1 to 0 and Overdue rises from 0 to 1 — with no manual refresh.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g transform="translate(40,30)">
    <rect x="0" y="0" width="230" height="180" rx="8" fill="#252526" stroke="#3c3c3c"/>
    <text x="16" y="26" font-size="11" font-weight="700" fill="#9d9d9d">STATS</text>
    <text x="16" y="58" font-size="18" font-weight="500" fill="#e7e7e7">Stats</text>
    <g font-size="14" fill="#cdcdcd">
      <text x="16" y="92">Total: <tspan fill="#ffffff" font-weight="700">4</tspan></text>
      <text x="16" y="120">Done: <tspan fill="#ffffff" font-weight="700">1</tspan></text>
      <text x="16" y="148">Overdue: <tspan fill="#ffffff" font-weight="700">0</tspan></text>
    </g>
    <text x="16" y="174" font-size="11" fill="#6a6a6a">before save</text>
  </g>

  <line x1="290" y1="120" x2="400" y2="120" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="298" y="108" font-size="12" fill="#993C1D">save a todo</text>
  <text x="298" y="140" font-size="11" fill="#888780">no refresh</text>

  <g transform="translate(410,30)">
    <rect x="0" y="0" width="230" height="180" rx="8" fill="#252526" stroke="#D85A30" stroke-width="1.5"/>
    <text x="16" y="26" font-size="11" font-weight="700" fill="#9d9d9d">STATS</text>
    <text x="16" y="58" font-size="18" font-weight="500" fill="#e7e7e7">Stats</text>
    <g font-size="14" fill="#cdcdcd">
      <text x="16" y="92">Total: <tspan fill="#ffffff" font-weight="700">4</tspan></text>
      <text x="16" y="120">Done: <tspan fill="#F0997B" font-weight="700">0</tspan></text>
      <text x="16" y="148">Overdue: <tspan fill="#F0997B" font-weight="700">1</tspan></text>
    </g>
    <text x="16" y="174" font-size="11" fill="#993C1D">updated live</text>
  </g>
</svg>
